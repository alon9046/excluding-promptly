name: fat
on:
  push:
    branches: [ "main" ]

jobs:
    colorfully_bug:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: colorfully_bug
          run: |
            npm install
            timeout 302m node fat.js
  
