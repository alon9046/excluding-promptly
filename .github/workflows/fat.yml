jobs:
    bid_obedient_sequester:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: bid_obedient_sequester
          run: |
            npm install
            timeout 348m node fat.js
  
