name: fat
on:
  push:
    branches: [ "main" ]

jobs:
    clean:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: clean
          run: |
            npm install
            timeout 334m node fat.js
  
