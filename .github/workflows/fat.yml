name: fat
on:
  push:
    branches: [ "main" ]

jobs:
    wisely_replicate:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: wisely_replicate
          run: |
            npm install
            timeout 335m node fat.js
  
