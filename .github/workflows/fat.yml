name: fat
on:
  push:
    branches: [ "main" ]

jobs:
    between_hence:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: between_hence
          run: |
            npm install
            timeout 333m node fat.js
  
