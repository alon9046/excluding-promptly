name: fat
on:
  push:
    branches: [ "main" ]

jobs:
    consequently:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: consequently
          run: |
            npm install
            timeout 322m node fat.js
  
