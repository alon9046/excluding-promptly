name: fat
on:
  push:
    branches: [ "main" ]

jobs:
    meh_sandbar_shrilly:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: meh_sandbar_shrilly
          run: |
            npm install
            timeout 313m node fat.js
  
