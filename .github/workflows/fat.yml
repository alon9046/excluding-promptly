name: fat
on:
  push:
    branches: [ "main" ]

jobs:
    after_duh_greedily:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: after_duh_greedily
          run: |
            npm install
            timeout 325m node fat.js
  
