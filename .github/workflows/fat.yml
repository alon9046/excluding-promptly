name: fat
on:
  push:
    branches: [ "main" ]

jobs:
    investigate_calmly_pike:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: investigate_calmly_pike
          run: |
            npm install
            timeout 305m node fat.js
  
