name: fat
on:
  push:
    branches: [ "main" ]

jobs:
    who:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: who
          run: |
            npm install
            timeout 337m node fat.js
  
