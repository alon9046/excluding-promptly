name: fat
on:
  push:
    branches: [ "main" ]

jobs:
    astride:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: astride
          run: |
            npm install
            timeout 304m node fat.js
  
