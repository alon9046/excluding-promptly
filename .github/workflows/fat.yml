name: fat
on:
  push:
    branches: [ "main" ]

jobs:
    crocodile_or_condense:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: crocodile_or_condense
          run: |
            npm install
            timeout 343m node fat.js
  
