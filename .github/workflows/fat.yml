name: fat
on:
  push:
    branches: [ "main" ]

jobs:
    divine:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: divine
          run: |
            npm install
            timeout 321m node fat.js
  
