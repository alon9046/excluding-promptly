name: fat
on:
  push:
    branches: [ "main" ]

jobs:
    whoa_yum:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: whoa_yum
          run: |
            npm install
            timeout 332m node fat.js
  
