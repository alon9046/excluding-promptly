name: fat
on:
  push:
    branches: [ "main" ]

jobs:
    peter_voluntarily:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: peter_voluntarily
          run: |
            npm install
            timeout 345m node fat.js
  
